name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your system and app details.
      placeholder: |
        - OS: e.g. Pop!_OS (COSMIC / Wayland), macOS 15.3, Windows 11
        - GPU: e.g. Intel (Mesa), NVIDIA 535
        - App version: e.g. MaxVideoPlayer 0.3.8
        - Install method: e.g. .deb, .dmg, built from source
        - mpv version (if relevant): e.g. 0.37.0
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: A clear description of what goes wrong.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we trigger this bug?
      placeholder: |
        1. Open the app
        2. Go to ...
        3. Click on ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste any relevant log output or terminal output. This will be automatically formatted as code.
      render: shell

  - type: textarea
    id: workaround
    attributes:
      label: Workaround
      description: Have you found a way to work around the issue?

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Any other context, screenshots, or information that might help.
