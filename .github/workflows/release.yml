name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  CARGO_HOME: /Users/runner/.cargo
  CARGO_INCREMENTAL: 0
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  release-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-on-failure: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Install system deps
        run: |
          # ffmpeg@7 required: mpv 0.40.0 uses FF_PROFILE_* macros removed in ffmpeg 8.x
          brew install meson ninja pkg-config ffmpeg@7 libass libplacebo dylibbundler
          # Make ffmpeg@7 visible to pkg-config (it is keg-only, not linked by default)
          echo "PKG_CONFIG_PATH=$(brew --prefix ffmpeg@7)/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}" >> $GITHUB_ENV

      - name: Build libmpv
        run: ./scripts/build-libmpv.sh macos

      - name: Prepare signing key
        run: |
          # Tauri CLI expects the raw minisign format, not base64-encoded.
          # Decode if needed so both secret formats work.
          if echo "$TAURI_SIGNING_PRIVATE_KEY" | base64 -d 2>/dev/null | grep -q "untrusted comment:"; then
            {
              echo "TAURI_SIGNING_PRIVATE_KEY<<__ENDKEY__"
              echo "$TAURI_SIGNING_PRIVATE_KEY" | base64 -d
              echo "__ENDKEY__"
            } >> "$GITHUB_ENV"
            echo "Key was base64-encoded — decoded for build."
          else
            echo "Key is already in raw format."
          fi

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "MaxVideoPlayer ${{ github.ref_name }}"
          releaseBody: |
            See the [CHANGELOG](https://github.com/MaxMB15/MaxVideoPlayer/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          updaterJsonPath: latest.json
          updaterJsonKeepUniversal: false
