name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  CARGO_HOME: /Users/runner/.cargo
  CARGO_INCREMENTAL: 0
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  release-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-on-failure: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Install system deps
        run: |
          # ffmpeg@7 required: mpv 0.40.0 uses FF_PROFILE_* macros removed in ffmpeg 8.x
          brew install meson ninja pkg-config ffmpeg@7 libass libplacebo dylibbundler
          # Make ffmpeg@7 visible to pkg-config (it is keg-only, not linked by default)
          echo "PKG_CONFIG_PATH=$(brew --prefix ffmpeg@7)/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}" >> $GITHUB_ENV

      - name: Build libmpv
        run: ./scripts/build-libmpv.sh macos

      - name: Prepare signing key
        run: |
          # Tauri CLI expects the raw minisign format, not base64-encoded.
          # Use Python for reliable base64 detection and decoding (avoids macOS
          # base64 -d edge cases with multiline input and partial valid sequences).
          python3 - << 'EOF'
          import base64, os, sys

          key = os.environ.get("TAURI_SIGNING_PRIVATE_KEY", "")
          if not key.strip():
              print("No signing key set — skipping.")
              sys.exit(0)

          try:
              decoded = base64.b64decode(key.strip()).decode("utf-8")
              if "untrusted comment:" in decoded:
                  with open(os.environ["GITHUB_ENV"], "a") as f:
                      f.write("TAURI_SIGNING_PRIVATE_KEY<<__ENDKEY__\n")
                      f.write(decoded.rstrip("\n") + "\n")
                      f.write("__ENDKEY__\n")
                  print("Key was base64-encoded — decoded for build.")
              else:
                  print("Key decoded but is not raw minisign format — using as-is.")
          except Exception:
              print("Key is already in raw minisign format.")
          EOF

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "MaxVideoPlayer ${{ github.ref_name }}"
          releaseBody: |
            See the [CHANGELOG](https://github.com/MaxMB15/MaxVideoPlayer/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          updaterJsonPath: latest.json
          updaterJsonKeepUniversal: false
