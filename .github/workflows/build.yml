name: Build & Bundle

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── macOS Desktop ──────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Install system deps
        run: |
          brew install meson ninja pkg-config ffmpeg libass libplacebo dylibbundler

      - name: Prepare libmpv for bundle
        run: ./scripts/build-libmpv.sh macos

      - name: Build frontend
        run: npm run build:desktop

      - name: Build Tauri app (macOS)
        run: bash -c 'cd apps/desktop && npx tauri build'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: MaxVideoPlayer-macOS
          path: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/macos/*.app

  # ── Android / Fire Stick — not yet implemented ─────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Placeholder
        run: echo "Android build not yet implemented — skipping"

  # ── iOS — not yet implemented ──────────────────────────────────────────
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Placeholder
        run: echo "iOS build not yet implemented — skipping"

  # ── Tests (run on every push/PR) ────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        # package-lock.json was generated on macOS; @rollup/rollup-linux-x64-gnu is absent
        # from the packages section (npm bug #4828). Deleting the lockfile forces npm to
        # resolve and install the correct platform-specific optional deps for Linux.
        run: rm -f package-lock.json && npm install

      - name: Rust type-check (core only — avoids Tauri GTK deps on Linux)
        run: cargo check -p mvp-core

      - name: Run Rust tests
        run: cargo test -p mvp-core -- --include-ignored

      - name: Run desktop tests
        working-directory: apps/desktop
        run: npm test
