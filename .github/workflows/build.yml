name: Build & Bundle

on:
  push:
    branches: [main, dev, release-*]
  pull_request:
    branches: [main, dev, release-*]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── macOS Desktop ──────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Install system deps
        run: |
          # ffmpeg@7 required: mpv 0.40.0 uses FF_PROFILE_* macros removed in ffmpeg 8.x
          brew install meson ninja pkg-config ffmpeg@7 libass libplacebo dylibbundler
          # Make ffmpeg@7 visible to pkg-config (it is keg-only, not linked by default)
          echo "PKG_CONFIG_PATH=$(brew --prefix ffmpeg@7)/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}" >> $GITHUB_ENV

      - name: Prepare libmpv for bundle
        run: ./scripts/build-libmpv.sh macos

      - name: Build frontend
        run: npm run build:desktop

      - name: Build Tauri app (macOS)
        # Override createUpdaterArtifacts=false so Tauri doesn't require a signing key in CI.
        # The updater artifact + signature is only needed in the release workflow.
        run: cd apps/desktop && npx tauri build --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: MaxVideoPlayer-macOS
          path: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app
          if-no-files-found: error

  # ── Linux Desktop ────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libmpv-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            libegl-dev libssl-dev pkg-config librsvg2-dev \
            patchelf rpm

      - name: Install frontend deps
        # package-lock.json was generated on macOS; delete and reinstall for Linux
        run: rm -f package-lock.json && npm install

      - name: Rust type-check (plugin + core)
        run: cargo check -p tauri-plugin-mpv -p mvp-core

      - name: Build frontend
        run: npm run build:desktop

      - name: Build Tauri app (Linux)
        run: cd apps/desktop && npx tauri build --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MaxVideoPlayer-Linux
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
            target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  # ── Android / Fire Stick — not yet implemented ─────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Placeholder
        run: echo "Android build not yet implemented — skipping"

  # ── iOS — not yet implemented ──────────────────────────────────────────
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Placeholder
        run: echo "iOS build not yet implemented — skipping"

  # ── Tests (run on every push/PR) ────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        # package-lock.json was generated on macOS; @rollup/rollup-linux-x64-gnu is absent
        # from the packages section (npm bug #4828). Deleting the lockfile forces npm to
        # resolve and install the correct platform-specific optional deps for Linux.
        run: rm -f package-lock.json && npm install

      - name: Rust type-check (core only — avoids Tauri GTK deps on Linux)
        run: cargo check -p mvp-core

      - name: Run Rust tests
        run: cargo test -p mvp-core -- --include-ignored

      - name: Run desktop tests with coverage
        working-directory: apps/desktop
        run: npm run test:coverage

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: jaywcjlove/coverage-badges-cli@v2.1.0
        with:
          source: apps/desktop/coverage/coverage-summary.json
          output: coverage/badge.svg

      - name: Deploy coverage badge to gh-pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./coverage
          destination_dir: coverage
          keep_files: true
